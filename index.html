<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Vegan Census | vgncount.com</title>
    
    <!-- Open Graph / Social Sharing Meta Tags -->
    <meta property="og:title" content="Global Vegan Census | vgncount.com">
    <meta property="og:description" content="A living count and global map of vegans worldwide. Join the census.">
    <meta property="og:url" content="https://vgncount.com">
    <meta property="og:type" content="website">

    <!-- SEO Meta Tags -->
    <meta name="description" content="Global Vegan Census is a real-time living count and interactive map tracking the global vegan community worldwide. Join the movement at vgncount.com." />
    <meta name="keywords" content="vegan census, global vegan count, vegan map, vgncount" />
    <link rel="canonical" href="https://vgncount.com" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="XWyRKyNUNu-NqgAWGeDLd_KuBe8Rjx61lfboQNrKBGY" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="profile_logo.png" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <style>
        :root {
            --bg-color: #0b0f0c; /* Sfondo spaziale nerastro/verde profondo */
            --text-color: #e2f0d9;
            --accent-color: #4CAF50;
            --accent-hover: #66BB6A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas solo per lo Starfield */
        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2; /* Sopra alle stelle */
            max-width: 650px;
            padding: 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8fa888;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.2);
        }

        /* Contenitore contatore con effetto Live Pulse (Battito) */
        .counter-wrapper {
            position: relative;
            display: inline-block;
            margin: 1.5rem 0;
        }

        .counter-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(76,175,80,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulseGlow 4s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.4; }
        }

        .counter {
            font-size: 5.5rem;
            font-weight: 800;
            color: var(--accent-color);
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 0 0 25px rgba(76, 175, 80, 0.4);
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #a3b899;
            margin-bottom: 2rem;
        }

        .action-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 1.5rem auto;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 2px solid #233822;
            border-radius: 10px;
            background: rgba(15, 24, 18, 0.8);
            color: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        input[type="email"]::placeholder {
            color: #6c8a66;
        }

        input[type="email"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
        }

        .website-field {
            display: none !important;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #3d7a36, #2d5a27);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(45, 90, 39, 0.4);
        }

        button:hover {
            background: linear-gradient(135deg, #4da343, #3d7a36);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
            transform: translateY(-1px);
        }

        button:active {
            transform: scale(0.98);
        }

        .privacy-note {
            font-size: 0.75rem;
            color: #7b9674;
            max-width: 400px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.4;
        }

        .privacy-note a {
            color: #a3b899;
            text-decoration: underline;
        }

        #map-container {
            width: 100%;
            max-width: 500px;
            height: 250px;
            margin: 0 auto;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #233822;
        }

        /* Personalizzazione visiva dei cluster sulla mappa scura */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(76, 175, 80, 0.4) !important;
        }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background-color: rgba(45, 90, 39, 0.9) !important;
            color: #e2f0d9 !important;
            font-weight: bold;
            font-family: inherit;
        }

        #toast {
            visibility: hidden;
            min-width: 280px;
            max-width: 400px;
            background-color: #142215;
            color: #e2f0d9;
            text-align: center;
            border-radius: 10px;
            padding: 14px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%) translateY(20px);
            transition: transform 0.3s ease, opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        footer {
            position: relative;
            z-index: 2;
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #7b9674;
        }

        footer a {
            color: #7b9674;
            text-decoration: none;
            margin: 0 5px;
        }

        footer a:hover {
            text-decoration: underline;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <!-- Canvas per lo sfondo stellare pulito -->
    <canvas id="space-canvas"></canvas>

    <div class="container">
        <h1>Global Vegan Census</h1>
        
        <div class="counter-wrapper">
            <div id="counter" class="counter">0</div>
        </div>

        <p class="subtitle">A living count of vegans worldwide.</p>

        <div class="action-box">
            <input type="email" id="emailInput" placeholder="Enter your email to join..." required>
            <input type="text" id="website" class="website-field" autocomplete="off" tabindex="-1">
            <button onclick="registerUser()">COUNT ME IN</button>
        </div>

        <div class="privacy-note">
            By joining, you agree to receive a secure verification link. Read our <a href="privacy.html">Privacy Policy</a>.
        </div>

        <div id="map-container">
            <div id="map" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <footer>
        <div style="margin-bottom: 0.5rem;">
            <a href="https://instagram.com/vgncount" target="_blank">Instagram: @vgncount</a>
        </div>
        vgncount.com &copy; 2026 &mdash; <a href="privacy.html">Privacy Policy</a>
    </footer>

    <div id="toast">Notifica</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
        // --- SCRIPT PER LO SFONDO STELLARE PULITO ---
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Generazione delle stelle
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5,
                speedY: (Math.random() - 0.5) * 0.2,
                speedX: (Math.random() - 0.5) * 0.2,
                opacity: Math.random() * 0.5 + 0.1
            });
        }

        function drawSpace() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Disegna e muovi le stelle
            ctx.fillStyle = '#4CAF50';
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                p.y += p.speedY;
                p.x += p.speedX;

                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
            });

            requestAnimationFrame(drawSpace);
        }
        drawSpace();

        // --- LOGICA DEL SITO ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBvhtCKo3vfcpRFbHT7WjwldYrdbQuw8c_E2U-RmvHUulssttN0IhXZc5aCvBwFWUW/exec';

        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            dragging: false,
            scrollWheelZoom: false
        }).setView([20, 0], 1);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Inizializzazione del gruppo di cluster per la mappa
        const markersCluster = L.markerClusterGroup({
            showCoverageOnHover: false,
            maxClusterRadius: 40
        });
        map.addLayer(markersCluster);

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 4500);
        }

        function animateCounter(targetValue) {
            const counterElement = document.getElementById('counter');
            if (targetValue === 0) {
                counterElement.innerText = "0";
                return;
            }
            let startValue = 0;
            let duration = 1200;
            let startTime = null;

            function animationStep(currentTime) {
                if (!startTime) startTime = currentTime;
                let progress = Math.min((currentTime - startTime) / duration, 1);
                let easeProgress = 1 - Math.pow(1 - progress, 3);
                let current = Math.floor(easeProgress * targetValue);
                
                counterElement.innerText = current.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(animationStep);
                } else {
                    counterElement.innerText = targetValue.toLocaleString();
                }
            }
            requestAnimationFrame(animationStep);
        }

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                animateCounter(data.count);
                
                if (data.locations && data.locations.length > 0) {
                    markersCluster.clearLayers();
                    data.locations.forEach(loc => {
                        const marker = L.circleMarker([loc.lat, loc.lng], {
                            color: '#66BB6A',
                            fillColor: '#4CAF50',
                            fillOpacity: 0.9,
                            radius: 6
                        });
                        markersCluster.addLayer(marker);
                    });
                }
            } catch (error) {
                console.error('Errore nel caricamento dei dati:', error);
                document.getElementById('counter').innerText = "0";
            }
        }

        fetchData();

        async function registerUser() {
            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.trim();
            const website = document.getElementById('website').value;
            
            if(!email || !email.includes('@')) {
                showToast('Please enter a valid email address.');
                return;
            }

            const button = document.querySelector('button');
            button.innerText = "TRANSMITTING..."; // Effetto spaziale/live
            button.disabled = true;

            try {
                let lat = "";
                let lng = "";
                try {
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();
                    if (ipData && typeof ipData.latitude === 'number' && typeof ipData.longitude === 'number') {
                        lat = ipData.latitude;
                        lng = ipData.longitude;
                    }
                } catch (err) {
                    console.log('Geolocalizzazione IP saltata');
                }

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({ email: email, lat: lat, lng: lng, website: website })
                });

                const result = await response.json();

                if (result.result === 'success') {
                    showToast('Verification email sent! Check your inbox to complete registration.');
                    emailInput.value = '';
                } else if (result.result === 'info') {
                    showToast(result.message);
                } else {
                    showToast('Notice: ' + (result.message || 'Something went wrong.'));
                }

                fetchData(); 
            } catch (error) {
                console.error('Errore durante la registrazione:', error);
                showToast('Connection error. Please try again.');
            } finally {
                button.innerText = "COUNT ME IN";
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
