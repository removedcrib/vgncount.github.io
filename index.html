<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Vegan Census | vgncount.com</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #fdfaf6;
            --text-color: #2c2c2c;
            --accent-color: #2d5a27;
            --accent-hover: #3d7a36;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 650px;
            padding: 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .counter {
            font-size: 5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin: 1rem 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 2rem;
        }

        .action-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 1.5rem auto;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        input[type="email"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(45, 90, 39, 0.1);
        }

        .website-field {
            display: none !important;
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Micro nota legale privacy sotto il form */
        .privacy-note {
            font-size: 0.75rem;
            color: #888;
            max-width: 400px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.4;
        }

        .privacy-note a {
            color: #666;
            text-decoration: underline;
        }

        #map-container {
            width: 100%;
            max-width: 500px;
            height: 250px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 2px solid #eee;
        }

        /* Stile Toast Notifications futuristico */
        #toast {
            visibility: hidden;
            min-width: 280px;
            max-width: 400px;
            background-color: #2c2c2c;
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 14px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%) translateY(20px);
            transition: transform 0.3s ease, opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #888;
        }

        footer a {
            color: #888;
            text-decoration: none;
            margin: 0 5px;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Global Vegan Census</h1>
        <div id="counter" class="counter">0</div>
        <p class="subtitle">A living count of vegans worldwide.</p>

        <div class="action-box">
            <input type="email" id="emailInput" placeholder="Enter your email to join..." required>
            <input type="text" id="website" class="website-field" autocomplete="off" tabindex="-1">
            <button onclick="registerUser()">COUNT ME IN</button>
        </div>

        <div class="privacy-note">
            By joining, you agree to receive a secure verification link. Read our <a href="privacy.html">Privacy Policy</a>.
        </div>

        <div id="map-container">
            <div id="map" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <footer>
        vgncount.com &copy; 2026 &mdash; <a href="privacy.html">Privacy Policy</a>
    </footer>

    <!-- Toast Notification Element -->
    <div id="toast">Notifica</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwMZS1hSwbXwXvmAqR6ETYWmkTcTphal0j6liRKn3gwr4MZXEz9ZsCjN7WST4XSkpiY/exec';

        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            dragging: false,
            scrollWheelZoom: false
        }).setView([20, 0], 1);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Funzione Toast futuristica al posto dei vecchi alert
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 4500);
        }

        // Effetto Slot Machine / Count-Up fluido per il contatore
        function animateCounter(targetValue) {
            const counterElement = document.getElementById('counter');
            if (targetValue === 0) {
                counterElement.innerText = "0";
                return;
            }
            let startValue = 0;
            let duration = 1200; // Durata dell'animazione in millisecondi
            let startTime = null;

            function animationStep(currentTime) {
                if (!startTime) startTime = currentTime;
                let progress = Math.min((currentTime - startTime) / duration, 1);
                // Effetto Ease-Out cubico per renderlo morbido alla fine
                let easeProgress = 1 - Math.pow(1 - progress, 3);
                let current = Math.floor(easeProgress * targetValue);
                
                counterElement.innerText = current.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(animationStep);
                } else {
                    counterElement.innerText = targetValue.toLocaleString();
                }
            }
            requestAnimationFrame(animationStep);
        }

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                animateCounter(data.count);
                
                if (data.locations && data.locations.length > 0) {
                    data.locations.forEach(loc => {
                        L.circleMarker([loc.lat, loc.lng], {
                            color: '#3d7a36',
                            fillColor: '#4CAF50',
                            fillOpacity: 0.9,
                            radius: 6
                        }).addTo(map);
                    });
                }
            } catch (error) {
                console.error('Errore nel caricamento dei dati:', error);
                document.getElementById('counter').innerText = "0";
            }
        }

        fetchData();

        async function registerUser() {
            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.trim();
            const website = document.getElementById('website').value;
            
            if(!email || !email.includes('@')) {
                showToast('Please enter a valid email address.');
                return;
            }

            const button = document.querySelector('button');
            button.innerText = "Registering...";
            button.disabled = true;

            try {
                let lat = "";
                let lng = "";
                try {
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();
                    if (ipData && typeof ipData.latitude === 'number' && typeof ipData.longitude === 'number') {
                        lat = ipData.latitude;
                        lng = ipData.longitude;
                    }
                } catch (err) {
                    console.log('Geolocalizzazione IP saltata');
                }

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({ email: email, lat: lat, lng: lng, website: website })
                });

                const result = await response.json();

                if (result.result === 'success') {
                    showToast('Verification email sent! Check your inbox to complete registration.');
                    emailInput.value = '';
                } else if (result.result === 'info') {
                    showToast(result.message);
                } else {
                    showToast('Notice: ' + (result.message || 'Something went wrong.'));
                }

                fetchData(); 
            } catch (error) {
                console.error('Errore durante la registrazione:', error);
                showToast('Connection error. Please try again.');
            } finally {
                button.innerText = "COUNT ME IN";
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
