<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Vegan Census | vgncount.com</title>
    <!-- Leaflet CSS per la mappa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #fdfaf6;
            --text-color: #2c2c2c;
            --accent-color: #2d5a27;
            --accent-hover: #3d7a36;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 650px;
            padding: 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .counter {
            font-size: 5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin: 1rem 0;
            line-height: 1;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 2rem;
        }

        .action-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 2.5rem auto;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input[type="email"]:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* Stile moderno e giovanile per la mappa */
        #map-container {
            width: 100%;
            max-width: 500px;
            height: 250px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 2px solid #eee;
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Global Vegan Census</h1>
        <div id="counter" class="counter">...</div>
        <p class="subtitle">A living count of vegans worldwide.</p>

        <div class="action-box">
            <input type="email" id="emailInput" placeholder="Enter your email to join..." required>
            <button onclick="registerUser()">COUNT ME IN</button>
        </div>

        <!-- Mappa interattiva minimal dark -->
        <div id="map-container">
            <div id="map" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <footer>
        vgncount.com &copy; 2026 &mdash; United for the future.
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_u9By7RW9oUzhGlFCRrCg1BW7qkmY5oIjS2p318f54tfyG7iiy8Cm7ZoLUj5f4doU/exec';

        // Inizializzazione della mappa con stile Dark minimal
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([20, 0], 1);

        // Tile layer scuro in linea con il design giovanile del sito
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Esempio di marker stilizzato (puoi espanderlo in seguito collegandolo ai dati del foglio)
        // L.circleMarker([41.9028, 12.4964], {
        //     color: '#3d7a36',
        //     fillColor: '#3d7a36',
        //     fillOpacity: 0.8,
        //     radius: 6
        // }).addTo(map);

        // Carica il contatore attuale all'avvio della pagina
        async function fetchCounter() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                document.getElementById('counter').innerText = data.count.toLocaleString();
            } catch (error) {
                console.error('Errore nel caricamento del contatore:', error);
                document.getElementById('counter').innerText = "0";
            }
        }

        fetchCounter();

        // Invia l'email al database Google Sheets quando l'utente si registra
        async function registerUser() {
            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.trim();
            
            if(!email || !email.includes('@')) {
                alert('Please enter a valid email address.');
                return;
            }

            const button = document.querySelector('button');
            button.innerText = "Registering...";
            button.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                });

                alert('Thank you! We have sent you a verification email. Please check your inbox and click the link to complete your registration.');
                emailInput.value = '';
                fetchCounter(); // Aggiorna subito il contatore
            } catch (error) {
                console.error('Errore durante la registrazione:', error);
                alert('Something went wrong. Please try again.');
            } finally {
                button.innerText = "COUNT ME IN";
                button.disabled = false;
            }
        }
    </script>

</body>
</html>
