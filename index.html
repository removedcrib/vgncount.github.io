<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Vegan Census | vgncount.com</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #0b0f0c; /* Sfondo spaziale nerastro/verde profondo */
            --text-color: #e2f0d9;
            --accent-color: #4CAF50;
            --accent-hover: #66BB6A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas per lo Starfield e le sagome degli animali in background */
        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2; /* Sopra alle particelle */
            max-width: 650px;
            padding: 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8fa888;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.2);
        }

        /* Contenitore contatore con effetto Live Pulse (Battito) */
        .counter-wrapper {
            position: relative;
            display: inline-block;
            margin: 1.5rem 0;
        }

        .counter-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(76,175,80,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulseGlow 4s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.4; }
        }

        .counter {
            font-size: 5.5rem;
            font-weight: 800;
            color: var(--accent-color);
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 0 0 25px rgba(76, 175, 80, 0.4);
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #a3b899;
            margin-bottom: 2rem;
        }

        .action-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 1.5rem auto;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 2px solid #233822;
            border-radius: 10px;
            background: rgba(15, 24, 18, 0.8);
            color: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        input[type="email"]::placeholder {
            color: #6c8a66;
        }

        input[type="email"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
        }

        .website-field {
            display: none !important;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #3d7a36, #2d5a27);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(45, 90, 39, 0.4);
        }

        button:hover {
            background: linear-gradient(135deg, #4da343, #3d7a36);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
            transform: translateY(-1px);
        }

        button:active {
            transform: scale(0.98);
        }

        .privacy-note {
            font-size: 0.75rem;
            color: #7b9674;
            max-width: 400px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.4;
        }

        .privacy-note a {
            color: #a3b899;
            text-decoration: underline;
        }

        #map-container {
            width: 100%;
            max-width: 500px;
            height: 250px;
            margin: 0 auto;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #233822;
        }

        #toast {
            visibility: hidden;
            min-width: 280px;
            max-width: 400px;
            background-color: #142215;
            color: #e2f0d9;
            text-align: center;
            border-radius: 10px;
            padding: 14px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%) translateY(20px);
            transition: transform 0.3s ease, opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        footer {
            position: relative;
            z-index: 2;
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #7b9674;
        }

        footer a {
            color: #7b9674;
            text-decoration: none;
            margin: 0 5px;
        }

        footer a:hover {
            text-decoration: underline;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <!-- Canvas per lo sfondo stellare e le sagome animate -->
    <canvas id="space-canvas"></canvas>

    <div class="container">
        <h1>Global Vegan Census</h1>
        
        <div class="counter-wrapper">
            <div id="counter" class="counter">0</div>
        </div>

        <p class="subtitle">A living count of vegans worldwide.</p>

        <div class="action-box">
            <input type="email" id="emailInput" placeholder="Enter your email to join..." required>
            <input type="text" id="website" class="website-field" autocomplete="off" tabindex="-1">
            <button onclick="registerUser()">COUNT ME IN</button>
        </div>

        <div class="privacy-note">
            By joining, you agree to receive a secure verification link. Read our <a href="privacy.html">Privacy Policy</a>.
        </div>

        <div id="map-container">
            <div id="map" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <footer>
        vgncount.com &copy; 2026 &mdash; <a href="privacy.html">Privacy Policy</a>
    </footer>

    <div id="toast">Notifica</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // --- SCRIPT PER LO SFONDO STELLARE E SAGOME ANIMATE ---
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let silhouettes = [];

        // Definizione dei Path SVG (Mucca, Maiale, Pecora, Gallina)
        const animalPaths = [
            // Mucca
            "M21.37,10.55c-.24-.48-.71-.82-1.25-.92-.61-.11-1.25.1-1.66.56-.47.53-.61,1.29-.39,1.96.12.38.37.71.7,.93v2.96c0,1.1-.9,2-2,2s-2-.9-2-2v-1.5c-.88-.34-1.5-1.21-1.5-2.22,0-1.38,1.12-2.5,2.5-2.5h.5c.83,0,1.5-.67,1.5-1.5s-.67-1.5-1.5-1.5h-2.5c-2.48,0-4.5,2.02-4.5,4.5v1c0,1.1-.9,2-2,2s-2-.9-2-2v-2c0-1.66,1.34-3,3-3h1c.55,0,1-.45,1-1s-.45-1-1-1h-1c-2.76,0-5,2.24-5,5v4c0,1.66,1.34,3,3,3h1v4.5c0,1.38,1.12,2.5,2.5,2.5s2.5-1.12,2.5-2.5v-3.5h2v3.5c0,1.38,1.12,2.5,2.5,2.5s2.5-1.12,2.5-2.5v-6.04c.82-.44,1.37-1.3,1.37-2.28v-3.13c.27-.3.45-.69.51-1.11.08-.54-.08-1.09-.43-1.5z",
            // Maiale
            "M22.5,10.5c-.83,0-1.5.67-1.5,1.5,0,1.1-.9,2-2,2h-1c-1.1,0-2-.9-2-2v-1c0-.83-.67-1.5-1.5-1.5h-4c-1.93,0-3.5,1.57-3.5,3.5v1.5c0,.83-.67,1.5-1.5,1.5s-1.5-.67-1.5-1.5v-2c0-2.76,2.24-5,5-5h6c1.38,0,2.5,1.12,2.5,2.5v.5c.55,0,1,.45,1,1s-.45,1-1,1h.5c.83,0,1.5.67,1.5,1.5zm-14.5,7.5c0,1.38-1.12,2.5-2.5,2.5s-2.5-1.12-2.5-2.5v-3.5h1v3.5c0,.83.67,1.5,1.5,1.5s1.5-.67,1.5-1.5v-3.5h1v3.5zm11,0c0,1.38-1.12,2.5-2.5,2.5s-2.5-1.12-2.5-2.5v-3.5h1v3.5c0,.83.67,1.5,1.5,1.5s1.5-.67,1.5-1.5v-3.5h1v3.5z",
            // Pecora
            "M21,11c-.55,0-1,.45-1,1,0,1.1-.9,2-2,2h-1c-.55,0-1,.45-1,1s.45,1,1,1h1c1.66,0,3-1.34,3-3,0-.55-.45-1-1-1zm-6-4c-2.21,0-4,1.79-4,4,0,.55.45,1,1,1s1-.45,1-1c0-1.1.9-2,2-2s2,.9,2,2-.9,2-2,2c-.55,0-1,.45-1,1s.45,1,1,1c2.21,0,4-1.79,4-4s-1.79-4-4-4zm-8,7c-.55,0-1,.45-1,1v4.5c0,1.38,1.12,2.5,2.5,2.5s2.5-1.12,2.5-2.5v-3.5h1v3.5c0,1.38,1.12,2.5,2.5,2.5s2.5-1.12,2.5-2.5v-3.5h1v-1c0-2.76-2.24-5-5-5h-3c-2.76,0-5,2.24-5,5v1h1v-1c0-1.66,1.34-3,3-3h3c1.66,0,3,1.34,3,3v.5c-.88-.34-1.85-.5-2.85-.5h-2.3c-.95,0-1.85.37-2.53,1.03-.68.66-1.07,1.56-1.07,2.47z",
            // Gallina
            "M14,8c-.55,0-1,.45-1,1s.45,1,1,1h1c.55,0,1-.45,1-1s-.45-1-1-1h-1zm-2,3c-2.21,0-4,1.79-4,4v1c0,1.1-.9,2-2,2s-2-.9-2-2v-1c0-3.31,2.69-6,6-6h2c.83,0,1.5.67,1.5,1.5s-.67,1.5-1.5,1.5h-2zm-3,8c0,.55-.45,1-1,1s-1-.45-1-1v-2c0-.55.45-1,1-1s1,.45,1,1v2zm6,0c0,.55-.45,1-1,1s-1-.45-1-1v-2c0-.55.45-1,1-1s1,.45,1,1v2z"
        ];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Generazione delle stelle (particelle classiche)
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5,
                speedY: (Math.random() - 0.5) * 0.2,
                speedX: (Math.random() - 0.5) * 0.2,
                opacity: Math.random() * 0.5 + 0.1
            });
        }

        // Generazione delle sagome degli animali fluttuanti
        for (let i = 0; i < 6; i++) {
            silhouettes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 18 + 22, // Dimensione della sagoma
                speedY: (Math.random() - 0.5) * 0.15 - 0.05, // Lieve movimento verso l'alto
                speedX: (Math.random() - 0.5) * 0.15,
                opacity: Math.random() * 0.12 + 0.04, // Molto delicate e sullo sfondo
                pathString: animalPaths[Math.floor(Math.random() * animalPaths.length)]
            });
        }

        function drawSpace() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Disegna e muovi le sagome degli animali
            silhouettes.forEach(s => {
                ctx.save();
                ctx.globalAlpha = s.opacity;
                ctx.fillStyle = '#4CAF50';
                ctx.translate(s.x, s.y);
                
                // Scala il path SVG in base alla dimensione desiderata
                const p = new Path2D(s.pathString);
                ctx.scale(s.size / 24, s.size / 24);
                ctx.fill(p);
                ctx.restore();

                // Aggiorna posizione
                s.y += s.speedY;
                s.x += s.speedX;

                // Effetto loop bordi schermo
                if (s.y < -50) s.y = canvas.height + 50;
                if (s.y > canvas.height + 50) s.y = -50;
                if (s.x < -50) s.x = canvas.width + 50;
                if (s.x > canvas.width + 50) s.x = -50;
            });

            // Disegna e muovi le stelle
            ctx.fillStyle = '#4CAF50';
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                p.y += p.speedY;
                p.x += p.speedX;

                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
            });

            requestAnimationFrame(drawSpace);
        }
        drawSpace();

        // --- LOGICA DEL SITO ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwMZS1hSwbXwXvmAqR6ETYWmkTcTphal0j6liRKn3gwr4MZXEz9ZsCjN7WST4XSkpiY/exec';

        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            dragging: false,
            scrollWheelZoom: false
        }).setView([20, 0], 1);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 4500);
        }

        function animateCounter(targetValue) {
            const counterElement = document.getElementById('counter');
            if (targetValue === 0) {
                counterElement.innerText = "0";
                return;
            }
            let startValue = 0;
            let duration = 1200;
            let startTime = null;

            function animationStep(currentTime) {
                if (!startTime) startTime = currentTime;
                let progress = Math.min((currentTime - startTime) / duration, 1);
                let easeProgress = 1 - Math.pow(1 - progress, 3);
                let current = Math.floor(easeProgress * targetValue);
                
                counterElement.innerText = current.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(animationStep);
                } else {
                    counterElement.innerText = targetValue.toLocaleString();
                }
            }
            requestAnimationFrame(animationStep);
        }

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                animateCounter(data.count);
                
                if (data.locations && data.locations.length > 0) {
                    data.locations.forEach(loc => {
                        L.circleMarker([loc.lat, loc.lng], {
                            color: '#66BB6A',
                            fillColor: '#4CAF50',
                            fillOpacity: 0.9,
                            radius: 6
                        }).addTo(map);
                    });
                }
            } catch (error) {
                console.error('Errore nel caricamento dei dati:', error);
                document.getElementById('counter').innerText = "0";
            }
        }

        fetchData();

        async function registerUser() {
            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.trim();
            const website = document.getElementById('website').value;
            
            if(!email || !email.includes('@')) {
                showToast('Please enter a valid email address.');
                return;
            }

            const button = document.querySelector('button');
            button.innerText = "Registering...";
            button.disabled = true;

            try {
                let lat = "";
                let lng = "";
                try {
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();
                    if (ipData && typeof ipData.latitude === 'number' && typeof ipData.longitude === 'number') {
                        lat = ipData.latitude;
                        lng = ipData.longitude;
                    }
                } catch (err) {
                    console.log('Geolocalizzazione IP saltata');
                }

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({ email: email, lat: lat, lng: lng, website: website })
                });

                const result = await response.json();

                if (result.result === 'success') {
                    showToast('Verification email sent! Check your inbox to complete registration.');
                    emailInput.value = '';
                } else if (result.result === 'info') {
                    showToast(result.message);
                } else {
                    showToast('Notice: ' + (result.message || 'Something went wrong.'));
                }

                fetchData(); 
            } catch (error) {
                console.error('Errore durante la registrazione:', error);
                showToast('Connection error. Please try again.');
            } finally {
                button.innerText = "COUNT ME IN";
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
